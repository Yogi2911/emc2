name: CI-CD

on: 
 push:
   branches:
       -main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npm test

      - run: npm run build

  deploy:

    needs: build

    runs-on: ubuntu-latest

    steps:

      - run: echo "Deploying to Server"